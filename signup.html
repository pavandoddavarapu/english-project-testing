<!DOCTYPE html>
<html lang="en" data-theme="green">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Free – Speak Up! AI English Speaking Practice</title>
  <meta name="description" content="Create your free Speak Up! account and start practising English speaking with AI feedback. Get instant scores on fluency, clarity and confidence. Join today!">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://speakupai.me/signup">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Speak Up!">
  <meta property="og:title" content="Sign Up Free – Speak Up! AI English Practice">
  <meta property="og:description" content="Join Speak Up! for free and practise English speaking with AI-powered feedback. Get fluency scores, daily topics, streaks and more.">
  <meta property="og:url" content="https://speakupai.me/signup">
  <meta property="og:image" content="https://speakupai.me/assets/images/og-banner.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sign Up Free – Speak Up! AI English Practice">
  <meta name="twitter:description" content="Join Speak Up! free and get AI feedback on your English speaking. Fluency scores, daily topics & streaks.">
  <meta name="twitter:image" content="https://speakupai.me/assets/images/og-banner.png">
  <link rel="manifest" href="assets/manifest.json">
  <meta name="theme-color" content="#D63384">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/icon-192.png">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preload" href="assets/css/style.css" as="style">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/page-transitions.js" defer></script>
  <script>
    (function() {
      const saved = localStorage.getItem("speakup-theme") || "green";
      document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>
  
  <style>
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .auth-card {
      background: rgba(255,255,255,0.75);
      border: 1.5px solid var(--accent2);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px var(--shadow-lg);
      backdrop-filter: blur(12px);
      text-align: center;
      animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    
    html[data-theme="dark"] .auth-card {
      background: rgba(40,40,40,0.95) !important;
    }

    .auth-logo {
      font-family: 'Pacifico', cursive;
      color: var(--primary);
      font-size: 2.2rem;
      margin-bottom: 5px;
      text-shadow: 2px 2px 0 var(--accent2);
    }

    .auth-title {
      font-family: 'Fredoka One', cursive;
      color: var(--primary-dark);
      font-size: 1.4rem;
      margin-bottom: 25px;
      letter-spacing: 0.5px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    /* Gender Selector */
    .gender-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .gender-label-title {
      display: block;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }
    .gender-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .gender-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 2px solid var(--accent2);
      border-radius: 999px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      background: rgba(255,255,255,0.6);
      transition: all 0.2s;
    }
    .gender-pill input[type="radio"] { display: none; }
    .gender-pill:has(input:checked) {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px var(--shadow);
    }

    .input-label {
      display: block;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .auth-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--accent2);
      border-radius: 12px;
      background: rgba(255,255,255,0.9);
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      transition: all 0.2s;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    
    html[data-theme="dark"] .auth-input {
      background: rgba(26,26,26,0.9) !important;
    }

    .auth-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(214,51,132,0.15), inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .auth-input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .btn-auth {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 15px;
      margin-bottom: 0;
      animation: none;
    }

    .auth-links {
      margin-top: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .auth-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 800;
      transition: color 0.2s;
    }

    .auth-links a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: var(--text-muted);
      font-weight: 800;
      font-size: 0.85rem;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1.5px solid var(--accent2);
    }
    
    .divider span {
      padding: 0 10px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: rgba(255,255,255,0.8);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      padding: 12px;
      border-radius: 12px;
      border: 1.5px solid var(--accent2);
      cursor: pointer;
      box-shadow: 0 4px 10px var(--shadow);
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .btn-google:hover {
      background: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 14px var(--shadow-lg);
    }

    .google-logo {
      width: 20px;
      height: 20px;
    }

    html[data-theme="dark"] .btn-google {
      background: rgba(40,40,40,0.95) !important;
      border-color: var(--accent2);
      color: var(--text);
    }
    html[data-theme="dark"] .btn-google:hover {
      background: rgba(255,255,255,0.08) !important;
    }

    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.9) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    /* Small decor */
    .decor-dot {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
      z-index: -1;
    }
    .dot-1 { width: 50px; height: 50px; top: -15px; left: -15px; }
    .dot-2 { width: 45px; height: 45px; bottom: 20px; right: -20px; background: var(--accent3); }
    .dot-3 { width: 30px; height: 30px; top: 30px; right: -10px; background: var(--primary); }

    @media (max-width: 540px) {
      .auth-card {
        padding: 28px 18px;
        border-radius: 16px;
      }
      .auth-logo { font-size: 1.8rem; }
      .auth-title { font-size: 1.2rem; margin-bottom: 18px; }
      .input-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .auth-input { padding: 10px 14px; font-size: 0.9rem; }
      .gender-pill { padding: 6px 10px; font-size: 0.78rem; }
      .btn-google { font-size: 0.88rem; padding: 10px; }
      .auth-links { font-size: 0.82rem; }
      .theme-switcher {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 100;
      }
    }
  </style>
</head>
<body>
  <!-- THEME SWITCHER -->
  <div class="theme-switcher" id="theme-switcher">
    <button class="theme-toggle-btn" id="theme-toggle-btn" title="Change Theme">
      <span class="theme-icon">🎨</span>
      <span class="theme-label">Theme</span>
      <span class="theme-arrow">▾</span>
    </button>
    <div class="theme-dropdown hidden" id="theme-dropdown">
      <div class="theme-dropdown-title">Choose a Theme</div>
      <div class="theme-grid">
        <button class="theme-swatch" data-theme="green" title="Forest Green" style="--sw:#2D6A4F"><span class="swatch-dot" style="background:#2D6A4F"></span>Forest</button>
        <button class="theme-swatch" data-theme="dark" title="Dark" style="--sw:#ffa116"><span class="swatch-dot" style="background:#ffa116"></span>Dark</button>
        <button class="theme-swatch" data-theme="pink" title="Blossom Pink" style="--sw:#D63384"><span class="swatch-dot" style="background:#D63384"></span>Blossom</button>
        <button class="theme-swatch" data-theme="blue" title="Ocean Blue" style="--sw:#1A6FA8"><span class="swatch-dot" style="background:#1A6FA8"></span>Ocean</button>
        <button class="theme-swatch" data-theme="purple" title="Royal Purple" style="--sw:#7B2FBE"><span class="swatch-dot" style="background:#7B2FBE"></span>Royal</button>
        <button class="theme-swatch" data-theme="orange" title="Sunset Orange" style="--sw:#D4580A"><span class="swatch-dot" style="background:#D4580A"></span>Sunset</button>
        <button class="theme-swatch" data-theme="teal" title="Teal Breeze" style="--sw:#0D9488"><span class="swatch-dot" style="background:#0D9488"></span>Teal</button>
      </div>
    </div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="decor-dot dot-1"></div>
      <div class="decor-dot dot-2"></div>
      <div class="decor-dot dot-3"></div>
      
      <div class="auth-logo">Speak Up!</div>
      <div class="auth-title">Join the Squad 🌟</div>
      
      <form id="signup-form" class="auth-form">
        <div class="input-group">
          <div class="input-icon">👤</div>
          <input type="text" id="name" class="auth-input" placeholder="Full Name" required>
        </div>

        <div class="input-group" style="position: relative; margin-bottom: 22px;">
          <div class="input-icon">@</div>
          <input type="text" id="username" class="auth-input" placeholder="Username (e.g. pavan_7)" required pattern="[a-zA-Z0-9_]{3,20}" title="3-20 characters: letters, numbers, underscores only" autocomplete="off">
          <div id="username-status" style="position:absolute; bottom:-18px; left:12px; font-size:0.72rem; font-weight:800; display:none;"></div>
        </div>

        <div class="input-group">
          <div class="input-icon">📧</div>
          <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
        </div>
        
        <div class="input-row">
          <div class="input-group">
            <div class="input-icon">🔒</div>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
          </div>
          <div class="input-group">
            <div class="input-icon">🔐</div>
            <input type="password" id="confirm-password" class="auth-input" placeholder="Confirm Password" required>
          </div>
        </div>

        <div class="gender-group">
          <span class="gender-label-title">👤 I identify as</span>
          <div class="gender-options">
            <label class="gender-pill">
              <input type="radio" name="gender" value="male"> 🧑 Male
            </label>
            <label class="gender-pill">
              <input type="radio" name="gender" value="female"> 👩 Female
            </label>
            <label class="gender-pill">
              <input type="radio" name="gender" value="nonbinary"> 🌈 Non-binary
            </label>
            <label class="gender-pill">
              <input type="radio" name="gender" value="prefer_not"> 🤐 Prefer not to say
            </label>
          </div>
        </div>

        <div class="input-group">
          <div class="input-icon">🔗</div>
          <input type="url" id="linkedin_url" class="auth-input" placeholder="LinkedIn Profile URL (Optional)">
        </div>

        <div class="input-group">
          <div class="input-icon">📸</div>
          <input type="url" id="instagram_url" class="auth-input" placeholder="Instagram Profile URL (Optional)">
        </div>
        
        <button type="submit" class="btn-primary btn-auth">Create Account 🚀</button>
      </form>
      
      <div class="divider">
        <span>OR</span>
      </div>
      
      <button type="button" id="google-signup-btn" class="btn-google">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-logo">
        Sign up with Google
      </button>
      
      <div class="auth-links">
        Already have an account? <a href="login.html">Log in here</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const themeToggleBtn = document.getElementById("theme-toggle-btn");
      const themeDropdown = document.getElementById("theme-dropdown");
      const themeSwatches = document.querySelectorAll(".theme-swatch");
      
      if(themeToggleBtn) {
        themeToggleBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const isOpen = !themeDropdown.classList.contains("hidden");
          themeDropdown.classList.toggle("hidden", isOpen);
          themeToggleBtn.classList.toggle("open", !isOpen);
        });
        
        document.addEventListener("click", (e) => {
          if (!e.target.closest("#theme-switcher")) {
            themeDropdown.classList.add("hidden");
            themeToggleBtn.classList.remove("open");
          }
        });
        
        themeSwatches.forEach(swatch => {
          swatch.addEventListener("click", () => {
            const theme = swatch.dataset.theme;
            applyTheme(theme);
            themeSwatches.forEach(s => s.classList.remove("active"));
            swatch.classList.add("active");
            setTimeout(() => {
              themeDropdown.classList.add("hidden");
              themeToggleBtn.classList.remove("open");
            }, 220);
          });
        });
        
        function applyTheme(theme) {
          document.documentElement.setAttribute("data-theme", theme);
          localStorage.setItem("speakup-theme", theme);
          const THEME_COLORS = { pink: "#D63384", green: "#2D6A4F", blue: "#1A6FA8", purple: "#7B2FBE", orange: "#D4580A", teal: "#0D9488", dark: "#ffa116" };
          const color = THEME_COLORS[theme] || THEME_COLORS.pink;
          themeToggleBtn.style.borderColor = color + "80";
        }
        
        function initTheme() {
          const saved = localStorage.getItem("speakup-theme") || "green";
          themeSwatches.forEach(s => s.classList.toggle("active", s.dataset.theme === saved));
          applyTheme(saved);
        }
        initTheme();
      }
    });
  </script>

  <script type="module">
    import { auth, provider } from './assets/js/firebase-config.js';
    import { signInWithPopup, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    // ── Real-time username availability check ──
    let _usernameCheckTimer = null;
    let _usernameAvailable = false;
    const usernameInput = document.getElementById('username');
    const usernameStatus = document.getElementById('username-status');
    
    usernameInput.addEventListener('input', () => {
      clearTimeout(_usernameCheckTimer);
      const val = usernameInput.value.trim().toLowerCase();
      _usernameAvailable = false;
      
      if (!val) {
        usernameStatus.style.display = 'none';
        usernameInput.style.borderColor = '';
        return;
      }
      if (!/^[a-zA-Z0-9_]{3,20}$/.test(val)) {
        usernameStatus.style.display = 'block';
        usernameStatus.style.color = '#d9534f';
        usernameStatus.innerText = '3-20 chars: letters, numbers, underscores only';
        usernameInput.style.borderColor = '#d9534f';
        return;
      }
      
      usernameStatus.style.display = 'block';
      usernameStatus.style.color = '#888';
      usernameStatus.innerText = 'Checking...';
      usernameInput.style.borderColor = '';
      
      _usernameCheckTimer = setTimeout(async () => {
        try {
          const res = await fetch(`/api/check-username?username=${encodeURIComponent(val)}`);
          const data = await res.json();
          if (usernameInput.value.trim().toLowerCase() !== val) return; // stale
          if (data.available) {
            usernameStatus.style.color = '#2d6a4f';
            usernameStatus.innerText = '✓ Username is available!';
            usernameInput.style.borderColor = '#2d6a4f';
            _usernameAvailable = true;
          } else {
            usernameStatus.style.color = '#d9534f';
            usernameStatus.innerText = '✗ ' + (data.reason || 'Username is taken');
            usernameInput.style.borderColor = '#d9534f';
            _usernameAvailable = false;
          }
        } catch (e) {
          usernameStatus.style.color = '#888';
          usernameStatus.innerText = 'Could not verify — will check on submit';
        }
      }, 500);
    });

    // If user is already logged in, redirect them directly to the dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'genz-streak-test.html';
      }
    });

    // Helper to create a user document in PostgreSQL if it doesn't exist
    async function initializeUserProfile(user, name, gender, linkedin = '', instagram = '', username = '') {
      console.log('[Signup] Initializing user profile via backend database...');
      const idToken = await user.getIdToken();
      const res = await fetch('/api/get-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          idToken,
          uid: user.uid,
          displayName: name || user.displayName || "New Speaker",
          email: user.email,
          gender: gender || 'prefer_not',
          linkedin_url: linkedin,
          instagram_url: instagram,
          username: username
        })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || 'Profile initialization failed');
      }
    }

    // Get the redirect destination (if present)
    const urlParams = new URLSearchParams(window.location.search);
    const redirectUrl = urlParams.get('redirect') ? decodeURIComponent(urlParams.get('redirect')) : 'genz-streak-test.html';

    // Handle Google Sign Up
    document.getElementById('google-signup-btn').addEventListener('click', async () => {
      try {
        const usernameVal = document.getElementById('username')?.value.trim().toLowerCase() || '';
        if (!usernameVal || !/^[a-zA-Z0-9_]{3,20}$/.test(usernameVal)) {
          alert('Please enter a valid username (3-20 characters, letters/numbers/underscores only).');
          return;
        }
        const result = await signInWithPopup(auth, provider);
        const gender = document.querySelector('input[name="gender"]:checked')?.value || 'prefer_not';
        const linkedin = document.getElementById('linkedin_url')?.value.trim() || '';
        const instagram = document.getElementById('instagram_url')?.value.trim() || '';
        await initializeUserProfile(result.user, result.user.displayName, gender, linkedin, instagram, usernameVal);
        window.location.href = redirectUrl;
      } catch (error) {
        console.error("Google Sign-Up Error:", error);
        alert(error.message);
      }
    });

    // Handle Email/Password Sign Up
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const usernameVal = document.getElementById('username').value.trim().toLowerCase();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const gender = document.querySelector('input[name="gender"]:checked')?.value || 'prefer_not';
      const linkedin = document.getElementById('linkedin_url')?.value.trim() || '';
      const instagram = document.getElementById('instagram_url')?.value.trim() || '';

      // Validate username
      if (!usernameVal || !/^[a-zA-Z0-9_]{3,20}$/.test(usernameVal)) {
        alert('Username must be 3-20 characters, containing only letters, numbers, or underscores.');
        return;
      }

      // ── Restrict signups to recognized personal email providers ──
      const domain = email.split('@')[1]?.toLowerCase();
      const allowedDomains = [
        'gmail.com',
        'yahoo.com',
        'outlook.com',
        'hotmail.com',
        'live.com',
        'msn.com',
        'icloud.com',
        'proton.me',
        'protonmail.com',
        'zoho.com',
        'aol.com',
        'ymail.com',
        'gmx.com',
        'mail.com'
      ];

      if (!allowedDomains.includes(domain)) {
        alert("Please use a recognized personal email provider (like Gmail, Outlook, Yahoo, or iCloud) to sign up.");
        return;
      }

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(result.user, { displayName: name });
        await initializeUserProfile(result.user, name, gender, linkedin, instagram, usernameVal);
        window.location.href = redirectUrl;
      } catch (error) {
        console.error("Email Sign-Up Error:", error);
        alert(error.message);
      }
    });
  </script>
</body>
</html>
