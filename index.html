<!DOCTYPE html>
<html lang="en" data-theme="pink">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speak Up! - Master English Speaking</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* Base Variables inspired by the Speak Up! theme */
    :root {
      --primary: #D63384;
      --primary-dark: #A31F60;
      --accent: #FFB3D1;
      --accent2: #FFDAE0;
      --bg: #FFF0F5;
      --text: #2A2A3E;
      --text-muted: #6B7280;
      --white: #FFFFFF;
      --radius: 24px;
      --shadow: rgba(214, 51, 132, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Background blobs */
    body::before {
      content: '';
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(214,51,132,0.15) 0%, transparent 60%);
      z-index: -1;
      border-radius: 50%;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(255,179,209,0.2) 0%, transparent 60%);
      z-index: -1;
      border-radius: 50%;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn-login {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--primary);
      text-decoration: none;
      padding: 10px 24px;
      border: 2px solid var(--primary);
      border-radius: 50px;
      transition: all 0.3s ease;
      background: transparent;
    }

    .btn-login:hover {
      background: rgba(214, 51, 132, 0.1);
      transform: translateY(-2px);
    }

    .btn-signup {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--white);
      text-decoration: none;
      padding: 12px 28px;
      background: var(--primary);
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(214, 51, 132, 0.4);
      transition: all 0.3s ease;
    }

    .btn-signup:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(214, 51, 132, 0.5);
    }

    /* Hero Section */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex-grow: 1;
      text-align: center;
      padding: 60px 20px;
    }

    .hero-pill {
      background: var(--accent2);
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 0.9rem;
      padding: 6px 16px;
      border-radius: 30px;
      margin-bottom: 24px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hero-title {
      font-family: 'Fredoka One', cursive;
      font-size: 4.5rem;
      color: var(--text);
      line-height: 1.1;
      max-width: 800px;
      margin-bottom: 24px;
    }

    .hero-title span {
      color: var(--primary);
      display: inline-block;
      position: relative;
    }

    .hero-title span::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 0;
      width: 100%;
      height: 12px;
      background: var(--accent);
      z-index: -1;
      border-radius: 10px;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: var(--text-muted);
      max-width: 600px;
      font-weight: 600;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .btn-main {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--white);
      text-decoration: none;
      padding: 16px 40px;
      background: var(--primary);
      border-radius: 50px;
      box-shadow: 0 8px 25px rgba(214, 51, 132, 0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-main:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(214, 51, 132, 0.5);
      background: var(--primary-dark);
    }

    /* Floating Icons Animation */
    .floating-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
    }

    .icon {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.8;
      animation: float 6s ease-in-out infinite;
    }

    .icon:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; font-size: 3rem; }
    .icon:nth-child(2) { top: 60%; left: 10%; animation-delay: 1s; font-size: 2.5rem; }
    .icon:nth-child(3) { top: 30%; right: 15%; animation-delay: 2s; font-size: 3.5rem; }
    .icon:nth-child(4) { top: 70%; right: 10%; animation-delay: 1.5s; font-size: 2rem; }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 3rem; }
      .navbar { padding: 15px 20px; }
      .nav-links { gap: 10px; }
      .btn-login, .btn-signup { padding: 8px 16px; font-size: 0.9rem; }
      .icon { display: none; }
    }
  </style>
</head>
<body>

  <!-- Floating Background Elements -->
  <div class="floating-icons">
    <div class="icon">🎙️</div>
    <div class="icon">✨</div>
    <div class="icon">🚀</div>
    <div class="icon">💡</div>
  </div>

  <nav class="navbar">
    <a href="#" class="brand">
      🎤 Speak Up!
    </a>
    <div class="nav-links" id="auth-links">
      <a href="login.html" class="btn-login">Login</a>
      <a href="signup.html" class="btn-signup">Sign Up Free</a>
    </div>
  </nav>

  <main class="hero">
    <div class="hero-pill">🔥 The Ultimate Practice Platform</div>
    <h1 class="hero-title">Master your English <br><span>speaking skills</span></h1>
    <p class="hero-subtitle">
      Level up your fluency with daily AI-generated speaking challenges, picture talks, and interview prep. Record, analyze, and improve your confidence!
    </p>
    <div class="hero-actions" id="hero-actions">
      <a href="signup.html" class="btn-main">
        Start Practicing <span>→</span>
      </a>
    </div>
  </main>

  <script type="module">
    import { auth } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      const authLinks = document.getElementById('auth-links');
      const heroActions = document.getElementById('hero-actions');
      
      if (user) {
        authLinks.innerHTML = `
          <a href="genz-streak-test.html" class="btn-login" style="border-color: transparent; font-weight: 800;">Dashboard</a>
          <a href="practice.html" class="btn-signup">Start Practice</a>
        `;
        heroActions.innerHTML = `
          <a href="practice.html" class="btn-main">
            Go to Practice Area <span>→</span>
          </a>
        `;
      }
    });
  </script>
</body>
</html>
