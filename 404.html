<!DOCTYPE html>
<html lang="en" data-theme="pink">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | Speak Up!</title>
  <meta name="description" content="Oops! This page doesn't exist. Let's get you back to practising English!">
  <link rel="manifest" href="assets/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/page-transitions.js" defer></script>
  <script>(function () { const t = localStorage.getItem("speakup-theme") || "pink"; document.documentElement.setAttribute("data-theme", t); })();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
    }

    /* Animated blobs */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--primary); opacity: 0.12; top: -200px; left: -200px; animation-delay: 0s; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent); opacity: 0.12; bottom: -150px; right: -150px; animation-delay: -4s; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent3); opacity: 0.2; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2s; }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }
    .blob-1 { animation-name: blobFloat1; }
    @keyframes blobFloat1 {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(40px, 30px); }
    }

    /* Main content */
    .content {
      position: relative; z-index: 1;
      text-align: center; padding: 24px;
      max-width: 600px;
    }

    /* Big glowing 404 */
    .error-number {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(7rem, 20vw, 12rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(var(--primary-rgb), 0.4));
      animation: numPulse 3s ease-in-out infinite;
      margin-bottom: 8px;
    }
    @keyframes numPulse {
      0%, 100% { filter: drop-shadow(0 0 40px rgba(var(--primary-rgb), 0.4)); }
      50% { filter: drop-shadow(0 0 60px rgba(var(--primary-rgb), 0.7)); }
    }

    /* Floating emoji */
    .float-emoji {
      font-size: 4rem; display: block;
      margin-bottom: 24px;
      animation: floatBounce 2.5s ease-in-out infinite;
    }
    @keyframes floatBounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    .error-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--text); margin-bottom: 16px;
    }
    .error-sub {
      font-size: 1.1rem; color: var(--text-muted);
      font-weight: 700; line-height: 1.7;
      margin-bottom: 40px;
    }
    .error-sub strong { color: var(--primary); }

    /* CTA buttons */
    .btn-group { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 48px; }

    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 99px;
      background: var(--primary); color: #fff;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem;
      text-decoration: none; box-shadow: 0 8px 24px var(--shadow-lg);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-home:hover { background: var(--primary-dark); transform: translateY(-3px) scale(1.04); box-shadow: 0 14px 32px var(--shadow-lg); }
    .btn-home:active { transform: translateY(0); }

    .btn-practice {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 99px;
      background: transparent; color: var(--primary);
      border: 2.5px solid var(--primary);
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-practice:hover { background: var(--primary); color: #fff; transform: translateY(-3px) scale(1.04); }

    /* Fun quote */
    .fun-quote {
      background: rgba(255,255,255,0.65);
      border: 1.5px solid var(--accent2);
      border-radius: 20px; padding: 20px 28px;
      backdrop-filter: blur(8px);
      max-width: 480px; margin: 0 auto;
      box-shadow: 0 8px 24px var(--shadow);
    }
    html[data-theme="dark"] .fun-quote { background: rgba(40,40,40,0.65); }
    .fun-quote p {
      font-size: 1rem; font-weight: 700;
      color: var(--text-muted); line-height: 1.6;
      font-style: italic;
    }
    .fun-quote strong { color: var(--primary); font-style: normal; }

    /* Page indicator dots */
    .quick-links {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; z-index: 2;
    }
    .quick-link {
      color: var(--text-muted); font-weight: 700; font-size: 0.85rem;
      text-decoration: none; transition: color 0.2s;
    }
    .quick-link:hover { color: var(--primary); }

    @media (max-width: 480px) {
      .error-sub { font-size: 0.95rem; }
      .btn-group { flex-direction: column; align-items: center; }
      .quick-links { gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Main content -->
  <main class="content">
    <span class="float-emoji" role="img" aria-label="Lost emoji">🗺️</span>
    <div class="error-number" aria-label="Error 404">404</div>
    <h1 class="error-title">Oops! Page Not Found</h1>
    <p class="error-sub">
      Looks like you got a little lost! 😅<br>
      The page you're looking for <strong>doesn't exist</strong> or may have been moved.
    </p>

    <div class="btn-group">
      <a href="index.html" class="btn-home" id="btn-go-home">🏠 Go Home</a>
      <a href="practice.html" class="btn-practice" id="btn-go-practice">🎤 Start Practising</a>
    </div>

    <div class="fun-quote" role="complementary" aria-label="Motivational quote">
      <p>
        "Even the greatest English speakers got lost sometimes —<br>
        the difference is they kept <strong>speaking</strong> through it! 💪"
      </p>
    </div>
  </main>

  <!-- Quick nav links at bottom -->
  <nav class="quick-links" aria-label="Quick navigation">
    <a href="index.html" class="quick-link">Home</a>
    <a href="about.html" class="quick-link">About</a>
    <a href="login.html" class="quick-link">Login</a>
    <a href="signup.html" class="quick-link">Sign Up</a>
  </nav>

</body>
</html>
